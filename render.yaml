services:
  - type: web
    name: a3-fintech-backend
    env: node
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps --no-workspaces && npm run build
    startCommand: npm run start:prod
    plan: free
    branch: entrega
    envVars:
      - key: CORS_ORIGIN
        value: https://a3-fintech.vercel.app
      - key: NODE_VERSION
        value: "18"
      - key: PORT
        value: "3001"
